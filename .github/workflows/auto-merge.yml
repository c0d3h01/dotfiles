name: Auto-Merge PR

on:
  workflow_call:
    inputs:
      pull-request-url:
        description: URL of the pull request to merge
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  checks: read
  statuses: read

jobs:
  auto-merge:
    if: inputs.pull-request-url != ''
    runs-on: ubuntu-latest

    steps:
      - name: Determine merge method
        id: merge
        run: |
          repo="${GITHUB_REPOSITORY}"
          data="$(gh api "repos/${repo}")"

          for method in rebase merge squash; do
            key="allow_${method}"
            [ "$method" = "merge" ] && key="allow_merge_commit"
            if [ "$(echo "$data" | jq -r ".${key}")" = "true" ]; then
              echo "method=$method" >> "$GITHUB_OUTPUT"
              echo "auto=$(echo "$data" | jq -r '.allow_auto_merge')" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done

          echo "::error::No allowed merge methods for ${repo}"
          exit 1
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Merge pull request
        run: |
          pr="${{ inputs.pull-request-url }}"
          method="${{ steps.merge.outputs.method }}"

          if [ "${{ steps.merge.outputs.auto }}" = "true" ]; then
            gh pr merge "--${method}" --auto --delete-branch "$pr"
          else
            gh pr checks --watch "$pr"
            gh pr merge "--${method}" --delete-branch "$pr"
          fi
        env:
          GH_TOKEN: ${{ github.token }}
